# Site settings
title: "Antonio De Caro"
description: "Academic Profile"
baseurl: "/" # the subpath of your site, e.g., /blog
url: "https://antonio-decaro.github.io"

# Build settings
markdown: kramdown
theme: null

# Custom 404 page
permalink: pretty

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/

# Plugins
plugins:
  - jekyll-scholar
  - jekyll-feed
  - jekyll-seo-tag

# Jekyll feed settings
feed:
  path: "feed.xml"
  posts_limit: 10

# Jekyll SEO Tag settings
seo:
  title: "Your Academic Name"
  description: "Academic Profile"
  image: "/assets/images/profile.jpg"
  twitter:
    username: "your_twitter_username"

# Navigation links
navigation:
  - title: HOME
    url: /
  - title: CV
    url: "/cv/"
  - title: PUBLICATIONS
    url: "/publications/"
  # - title: Projects
    # url: "/projects/"
  - title: CONTACT
    url: "/contact/"

scholar:
  source: _bibliography/
  bibliography_template: bib_entry
  sort_by: year
  order: descending
  style: apa